<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reading Tests – Adiba-Amonova</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo">
    <span class="nav-logo-dot"></span>Adiba-Amonova
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="reading.html">Reading</a></li>
    <li><a href="listening.html">Listening</a></li>
    <li><a href="mock-tests.html">Mock Tests</a></li>
    <li><a href="dashboard.html">My Dashboard</a></li>
    <li><a href="#" id="nav-logout" style="color:var(--text-subtle);">Logout</a></li>
    <li><a href="admin.html" class="nav-admin">Admin</a></li>
  </ul>
</nav>

<div class="page-header">
  <div class="page-header-inner">
    <h1>📖 Reading Tests</h1>
    <p>Click any test to open the full exam interface — timer, highlights, and answer sheet included.</p>
  </div>
</div>

<div class="section">
  <div id="announcements-container"></div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterTests('all',this)">All Tests</button>
    <button class="filter-btn" onclick="filterTests('academic',this)">Academic</button>
    <button class="filter-btn" onclick="filterTests('general',this)">General Training</button>
  </div>

  <div id="reading-list" class="test-list"></div>
</div>

<footer>
  <p>© 2025 Adiba-Amonova IELTS Platform &nbsp;·&nbsp; <a href="admin.html">Admin</a></p>
</footer>

<script src="script.js"></script>
<script>
  // Auth guard
  _sb.auth.getSession().then(({ data: { session } }) => {
    if (!session) {
      location.href = 'login.html?next=reading.html';
    } else {
      const lb = document.getElementById('nav-logout');
      if (lb) lb.addEventListener('click', async e => {
        e.preventDefault();
        await _sb.auth.signOut();
        location.href = 'login.html';
      });
    }
  });

  loadAnnouncements('announcements-container');

  async function loadReadingTests() {
    const listEl = document.getElementById('reading-list');
    listEl.innerHTML = `<div class="loading-spinner"><div class="spinner"></div><span>Loading tests…</span></div>`;
    try {
      const { data, error } = await _sb.storage.from(BUCKETS.reading).list('', {
        limit: 200, sortBy: { column: 'created_at', order: 'desc' }
      });
      if (error) throw error;
      const files = (data || []).filter(f => f.name !== '.emptyFolderPlaceholder');
      if (!files.length) {
        listEl.innerHTML = `<div class="empty-state"><div class="empty-icon">📂</div><h3>No tests yet</h3><p>Check back soon!</p></div>`;
        return;
      }
      listEl.innerHTML = files.map((file, i) => {
        const niceName = file.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
        const examUrl = `exam.html?file=${encodeURIComponent(file.name)}&bucket=reading-tests&name=${encodeURIComponent(niceName)}`;
        return `
          <a href="${examUrl}" class="test-item">
            <div class="test-item-left">
              <div class="test-num">${String(i+1).padStart(2,'0')}</div>
              <div>
                <div class="test-name">${niceName}</div>
                <div class="test-date">${formatDate(file.created_at)} · ${formatSize(file.metadata?.size)}</div>
              </div>
            </div>
            <span class="test-badge" style="display:flex;align-items:center;gap:.4rem;">
              ▶ Start Exam
            </span>
          </a>`;
      }).join('');
    } catch (err) {
      listEl.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Error</h3><p>${err.message}</p></div>`;
    }
  }

  loadReadingTests();

  function filterTests(type, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.test-item').forEach(item => {
      const name = item.querySelector('.test-name').textContent.toLowerCase();
      item.style.display = (type === 'all' || name.includes(type)) ? '' : 'none';
    });
  }
</script>
</body>
</html>
