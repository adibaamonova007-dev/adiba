<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reading Tests – Adiba-Amonova</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo">
    <span class="nav-logo-dot"></span>Adiba-Amonova
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="reading.html">Reading</a></li>
    <li><a href="listening.html">Listening</a></li>
    <li><a href="mock-tests.html">Mock Tests</a></li>
    <li><a href="dashboard.html">My Dashboard</a></li>
    <li><a href="#" id="nav-logout" style="color:var(--text-subtle);">Logout</a></li>
    <li><a href="admin.html" class="nav-admin">Admin</a></li>
  </ul>
</nav>

<div class="page-header">
  <div class="page-header-inner">
    <h1>📖 Reading Tests</h1>
    <p>Academic & General Training passages. Click any test to open it in a new tab.</p>
  </div>
</div>

<div class="section">
  <div id="announcements-container"></div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterTests('all',this)">All Tests</button>
    <button class="filter-btn" onclick="filterTests('academic',this)">Academic</button>
    <button class="filter-btn" onclick="filterTests('general',this)">General Training</button>
  </div>

  <div id="reading-list" class="test-list"></div>
</div>

<footer>
  <p>© 2025 Adiba-Amonova IELTS Platform &nbsp;·&nbsp; <a href="admin.html">Admin</a></p>
</footer>

<script src="script.js"></script>
<script>
  _sb.auth.getSession().then(({data:{session}})=>{
    if(!session) location.href="login.html?next="+encodeURIComponent(location.pathname.split("/").pop());
  } else {
    const lb = document.getElementById('nav-logout');
    if(lb) lb.addEventListener('click', async e => { e.preventDefault(); await _sb.auth.signOut(); location.href='login.html'; });
  }
});
</script>
<script>
  loadAnnouncements('announcements-container');
  const listEl = document.getElementById('reading-list');
  loadFilesFromBucket(BUCKETS.reading, listEl, 'No reading tests uploaded yet. Check back soon!');

  function filterTests(type, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    listEl.querySelectorAll('.test-item').forEach(item => {
      const name = item.querySelector('.test-name').textContent.toLowerCase();
      item.style.display = (type === 'all' || name.includes(type)) ? '' : 'none';
    });
  }
</script>
</body>
</html>
