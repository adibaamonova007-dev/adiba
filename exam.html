<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reading Exam – Adiba-Amonova</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="supabase-config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Outfit', sans-serif; background: var(--blue-void); color: var(--white); display: flex; flex-direction: column; }

    /* TOP BAR */
    .exam-topbar {
      height: 52px; background: rgba(3,11,24,0.97);
      border-bottom: 1px solid rgba(59,143,232,0.15);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.25rem; flex-shrink: 0; gap: 1rem; z-index: 50;
    }
    .exam-title { font-family:'Cormorant Garamond',serif; font-size:1.05rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:260px; }
    .topbar-mid { display:flex; align-items:center; gap:1rem; flex:1; justify-content:center; }
    .timer-wrap { display:flex; align-items:center; gap:.5rem; background:rgba(30,111,207,0.1); border:1px solid rgba(59,143,232,0.2); border-radius:9px; padding:.35rem .9rem; }
    .timer-display { font-size:1.15rem; font-weight:700; color:var(--blue-sky); letter-spacing:2px; min-width:60px; text-align:center; }
    .timer-display.warning { color:#f0c060; }
    .timer-display.danger  { color:#f08888; animation:blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }
    .q-counter { font-size:.78rem; color:var(--text-muted); background:rgba(12,31,63,0.7); border:1px solid rgba(59,143,232,.1); border-radius:8px; padding:.32rem .75rem; }
    .q-counter strong { color:var(--blue-sky); }
    .topbar-right { display:flex; gap:.4rem; align-items:center; }
    .tbtn { padding:.38rem .85rem; border-radius:7px; font-size:.78rem; font-weight:600; cursor:pointer; border:none; font-family:'Outfit',sans-serif; transition:var(--transition); }
    .tbtn-ghost { background:transparent; color:var(--text-muted); border:1px solid rgba(59,143,232,.18); }
    .tbtn-ghost:hover { color:var(--white); border-color:rgba(59,143,232,.35); }
    .tbtn-blue { background:var(--blue-vivid); color:var(--white); }
    .tbtn-blue:hover { background:var(--blue-bright); }
    .tbtn-red { background:rgba(207,60,60,.12); color:#f08888; border:1px solid rgba(207,60,60,.2); }
    .tbtn-red:hover { background:rgba(207,60,60,.22); }

    /* HIGHLIGHT BAR */
    .hl-bar { height:34px; background:rgba(3,11,24,0.92); border-bottom:1px solid rgba(59,143,232,0.07); display:flex; align-items:center; gap:.4rem; padding:0 1.25rem; flex-shrink:0; }
    .hl-lbl { font-size:.68rem; color:var(--text-subtle); text-transform:uppercase; letter-spacing:1.2px; margin-right:.2rem; }
    .hl-dot { width:18px; height:18px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:var(--transition); flex-shrink:0; }
    .hl-dot:hover,.hl-dot.on { border-color:var(--white); transform:scale(1.25); }
    .hl-y { background:#f5d020; } .hl-g { background:#4de89a; } .hl-p { background:#ff7eb3; }
    .hl-x { background:transparent; border:1px solid rgba(59,143,232,.2); color:var(--text-muted); font-size:.68rem; border-radius:5px; padding:0 .5rem; height:18px; cursor:pointer; font-family:'Outfit',sans-serif; }
    .hl-x:hover { color:var(--white); }
    .hl-tip { font-size:.68rem; color:var(--text-subtle); margin-left:.5rem; }

    /* SPLIT BODY */
    .exam-body { flex:1; display:flex; overflow:hidden; }
    .passage-pane { width:50%; overflow-y:auto; padding:1.75rem 2rem; background:rgba(7,20,40,0.25); flex-shrink:0; }
    .passage-pane::-webkit-scrollbar { width:5px; }
    .passage-pane::-webkit-scrollbar-thumb { background:rgba(59,143,232,.18); border-radius:3px; }
    .divider { width:5px; background:rgba(59,143,232,0.1); cursor:col-resize; flex-shrink:0; position:relative; transition:background .2s; }
    .divider:hover { background:rgba(59,143,232,0.3); }
    .questions-pane { flex:1; overflow-y:auto; padding:1.5rem 1.75rem; background:rgba(3,11,24,0.3); }
    .questions-pane::-webkit-scrollbar { width:5px; }
    .questions-pane::-webkit-scrollbar-thumb { background:rgba(59,143,232,.18); border-radius:3px; }

    /* PASSAGE */
    .passage-content { max-width:660px; margin:0 auto; line-height:1.85; font-size:.93rem; color:#ccdaf0; user-select:text; }
    .passage-content h1 { font-family:'Cormorant Garamond',serif; font-size:1.55rem; color:var(--white); margin:0 0 1rem; font-weight:700; }
    .passage-content h2 { font-family:'Cormorant Garamond',serif; font-size:1.2rem; color:var(--white); margin:1.25rem 0 .6rem; }
    .passage-content h3 { font-size:1rem; color:var(--blue-mist); margin:1rem 0 .5rem; }
    .passage-content p  { margin-bottom:.9rem; }
    .passage-content b,.passage-content strong { color:var(--white); }
    .passage-content table { border-collapse:collapse; width:100%; margin:1rem 0; font-size:.85rem; }
    .passage-content td,.passage-content th { border:1px solid rgba(59,143,232,.18); padding:.45rem .7rem; }
    .passage-content th { background:rgba(30,111,207,.1); color:var(--blue-sky); font-weight:600; }
    .passage-content ul,.passage-content ol { padding-left:1.5rem; margin-bottom:.9rem; }
    .passage-content li { margin-bottom:.35rem; }
    .hly { background:rgba(245,208,32,.3); border-radius:2px; }
    .hlg { background:rgba(77,232,154,.22); border-radius:2px; }
    .hlp { background:rgba(255,126,179,.28); border-radius:2px; }

    /* QUESTIONS */
    .ai-badge { display:inline-flex; align-items:center; gap:.4rem; background:rgba(30,111,207,.1); border:1px solid rgba(59,143,232,.2); color:var(--blue-sky); font-size:.72rem; font-weight:600; padding:.3rem .75rem; border-radius:100px; margin-bottom:1rem; }
    .q-block { background:rgba(12,31,63,0.5); border:1px solid rgba(59,143,232,0.1); border-radius:12px; margin-bottom:1.25rem; overflow:hidden; }
    .q-block-head { padding:.6rem 1.1rem; background:rgba(30,111,207,0.07); border-bottom:1px solid rgba(59,143,232,0.08); font-size:.75rem; color:var(--blue-sky); font-weight:600; text-transform:uppercase; letter-spacing:1px; }
    .q-block-body { padding:1.1rem 1.25rem; }
    .q-instruction { font-size:.8rem; color:var(--text-muted); line-height:1.6; margin-bottom:1rem; padding:.65rem .9rem; background:rgba(30,111,207,0.05); border-left:2.5px solid var(--blue-vivid); border-radius:0 6px 6px 0; }
    .q-item { margin-bottom:1.1rem; }
    .q-row { display:flex; align-items:baseline; gap:.5rem; margin-bottom:.4rem; }
    .q-badge { width:22px; height:22px; flex-shrink:0; background:rgba(30,111,207,.12); border:1px solid rgba(30,111,207,.2); border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:.7rem; font-weight:700; color:var(--blue-sky); }
    .q-badge.done { background:rgba(30,207,111,.12); border-color:rgba(30,207,111,.25); color:#5de89a; }
    .q-label { font-size:.85rem; color:var(--blue-mist); line-height:1.5; }
    .q-inp { width:100%; background:rgba(5,15,35,.85); border:1.5px solid rgba(59,143,232,.14); border-radius:7px; padding:.5rem .85rem; color:var(--white); font-family:'Outfit',sans-serif; font-size:.85rem; outline:none; transition:var(--transition); }
    .q-inp:focus { border-color:var(--blue-vivid); box-shadow:0 0 0 3px rgba(30,111,207,.1); }
    .q-inp.done { border-color:rgba(30,207,111,.28); }
    .mcq-list { display:flex; flex-direction:column; gap:.35rem; }
    .mcq-opt { display:flex; align-items:center; gap:.55rem; padding:.45rem .75rem; border-radius:7px; cursor:pointer; border:1px solid rgba(59,143,232,.1); transition:var(--transition); font-size:.83rem; color:var(--blue-mist); }
    .mcq-opt:hover { background:rgba(30,111,207,.07); border-color:rgba(59,143,232,.22); }
    .mcq-opt.sel { background:rgba(30,111,207,.16); border-color:var(--blue-vivid); color:var(--white); }
    .mcq-circle { width:15px; height:15px; border-radius:50%; border:2px solid rgba(59,143,232,.28); flex-shrink:0; transition:var(--transition); }
    .mcq-opt.sel .mcq-circle { background:var(--blue-vivid); border-color:var(--blue-vivid); }
    .tfng-row { display:flex; gap:.35rem; flex-wrap:wrap; }
    .tfng-opt { padding:.35rem .8rem; border-radius:6px; border:1px solid rgba(59,143,232,.14); background:transparent; color:var(--text-muted); font-size:.78rem; font-weight:600; cursor:pointer; transition:var(--transition); font-family:'Outfit',sans-serif; }
    .tfng-opt:hover { border-color:rgba(59,143,232,.3); color:var(--white); }
    .tfng-opt.sel { background:rgba(30,111,207,.18); border-color:var(--blue-vivid); color:var(--blue-sky); }
    .q-select { width:100%; background:rgba(5,15,35,.85); border:1.5px solid rgba(59,143,232,.14); border-radius:7px; padding:.5rem .85rem; color:var(--white); font-family:'Outfit',sans-serif; font-size:.83rem; outline:none; transition:var(--transition); cursor:pointer; }
    .q-select:focus { border-color:var(--blue-vivid); }
    .q-select option { background:var(--blue-dark); }

    /* ANSWER STRIP */
    .ans-strip { height:40px; background:rgba(3,11,24,.96); border-top:1px solid rgba(59,143,232,.08); display:flex; align-items:center; gap:.25rem; padding:0 1.25rem; overflow-x:auto; flex-shrink:0; }
    .ans-strip::-webkit-scrollbar { height:0; }
    .ans-strip-lbl { font-size:.68rem; color:var(--text-subtle); margin-right:.35rem; white-space:nowrap; text-transform:uppercase; letter-spacing:.8px; }
    .a-dot { width:22px; height:22px; border-radius:5px; border:1.5px solid rgba(59,143,232,.18); display:flex; align-items:center; justify-content:center; font-size:.65rem; font-weight:700; color:var(--text-subtle); cursor:pointer; transition:var(--transition); flex-shrink:0; }
    .a-dot.done { background:rgba(30,207,111,.12); border-color:rgba(30,207,111,.28); color:#5de89a; }
    .a-dot:hover { border-color:rgba(59,143,232,.4); color:var(--white); }

    /* MODAL */
    .ov { position:fixed; inset:0; background:rgba(0,5,18,.82); backdrop-filter:blur(8px); z-index:200; display:flex; align-items:center; justify-content:center; padding:1rem; opacity:0; pointer-events:none; transition:var(--transition); }
    .ov.open { opacity:1; pointer-events:all; }
    .modal { background:var(--blue-dark); border:1px solid rgba(59,143,232,.15); border-radius:18px; padding:2.25rem; width:100%; max-width:460px; transform:translateY(18px); transition:var(--transition); box-shadow:var(--shadow); text-align:center; }
    .ov.open .modal { transform:translateY(0); }
    .res-score { font-family:'Cormorant Garamond',serif; font-size:5rem; font-weight:700; line-height:1; margin:.75rem 0 .4rem; }
    .res-label { font-size:1rem; color:var(--blue-sky); margin-bottom:1.5rem; }
    .res-grid { display:grid; grid-template-columns:1fr 1fr; gap:.65rem; margin-bottom:1.75rem; }
    .res-cell { background:rgba(12,31,63,.6); border-radius:9px; padding:.85rem; }
    .res-cell-n { font-family:'Cormorant Garamond',serif; font-size:1.75rem; color:var(--blue-sky); }
    .res-cell-l { font-size:.7rem; color:var(--text-subtle); text-transform:uppercase; letter-spacing:.8px; }

    /* LOADING */
    .load-ov { position:fixed; inset:0; background:var(--blue-void); z-index:300; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.1rem; transition:opacity .5s ease; }
    .load-ov.gone { opacity:0; pointer-events:none; }
    .load-title { font-family:'Cormorant Garamond',serif; font-size:1.4rem; }
    .load-bar { width:180px; height:3px; background:rgba(59,143,232,.1); border-radius:2px; overflow:hidden; }
    .load-prog { height:100%; background:var(--blue-vivid); width:0%; transition:width .4s ease; box-shadow:0 0 8px var(--blue-vivid); }
    .load-msg { font-size:.8rem; color:var(--text-muted); }
  </style>
</head>
<body>

<div class="load-ov" id="loadOv">
  <div class="load-title">Adiba-Amonova</div>
  <div class="spinner" style="width:30px;height:30px;"></div>
  <div class="load-bar"><div class="load-prog" id="loadProg"></div></div>
  <div class="load-msg" id="loadMsg">Preparing exam…</div>
</div>

<div class="exam-topbar">
  <div class="exam-title" id="examTitle">Reading Test</div>
  <div class="topbar-mid">
    <div class="timer-wrap"><span>⏱</span><div class="timer-display" id="timerEl">60:00</div></div>
    <div class="q-counter">Answered: <strong id="ansCount">0</strong> / <strong id="totCount">0</strong></div>
  </div>
  <div class="topbar-right">
    <button class="tbtn tbtn-ghost" onclick="togglePane()">📖 Passage</button>
    <button class="tbtn tbtn-blue" onclick="openSubmit()">Submit →</button>
    <button class="tbtn tbtn-red" onclick="doExit()">✕ Exit</button>
  </div>
</div>

<div class="hl-bar">
  <span class="hl-lbl">Highlight</span>
  <div class="hl-dot hl-y" id="hly" onclick="setHL('y')" title="Yellow"></div>
  <div class="hl-dot hl-g" id="hlg" onclick="setHL('g')" title="Green"></div>
  <div class="hl-dot hl-p" id="hlp" onclick="setHL('p')" title="Pink"></div>
  <button class="hl-x" onclick="setHL(null)">Off</button>
  <button class="hl-x" onclick="clearHL()" style="margin-left:.3rem;">Clear All</button>
  <span class="hl-tip">← Select text in passage to highlight</span>
</div>

<div class="exam-body">
  <div class="passage-pane" id="passagePane">
    <div class="passage-content" id="passageContent">
      <div class="loading-spinner"><div class="spinner"></div><span>Loading passage…</span></div>
    </div>
  </div>
  <div class="divider" id="divider"></div>
  <div class="questions-pane">
    <div id="questionsContent">
      <div class="loading-spinner"><div class="spinner"></div><span>Extracting questions with AI…</span></div>
    </div>
  </div>
</div>

<div class="ans-strip" id="ansStrip">
  <span class="ans-strip-lbl">Questions:</span>
</div>

<div class="ov" id="modalOv">
  <div class="modal" id="modalInner"></div>
</div>

<script>
const params   = new URLSearchParams(location.search);
const fileName = params.get('file') || '';
const bucket   = params.get('bucket') || 'reading-tests';
const testName = decodeURIComponent(params.get('name') || fileName.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ') || 'Reading Test');
document.getElementById('examTitle').textContent = testName;

let timeLeft=3600, timerInt=null, answers={}, totalQ=0, hlColor=null, started=false, done=false;

// AUTH
_sb.auth.getSession().then(({data:{session}})=>{
  if(!session){ location.href='login.html?next='+encodeURIComponent(location.pathname+location.search); return; }
  loadExam();
});

function setProgress(pct,msg){
  document.getElementById('loadProg').style.width=pct+'%';
  document.getElementById('loadMsg').textContent=msg;
}

async function loadExam(){
  setProgress(15,'Fetching exam file…');
  try{
    const {data:{publicUrl}} = _sb.storage.from(bucket).getPublicUrl(fileName);
    const ext = fileName.split('.').pop().toLowerCase();
    let rawText='', passageHTML='';

    if(ext==='docx'){
      setProgress(30,'Reading Word document…');
      const resp = await fetch(publicUrl);
      const buf  = await resp.arrayBuffer();
      setProgress(50,'Converting to readable format…');
      const [htmlRes, txtRes] = await Promise.all([
        mammoth.convertToHtml({arrayBuffer: buf}),
        mammoth.extractRawText({arrayBuffer: buf})
      ]);
      passageHTML = htmlRes.value;
      rawText     = txtRes.value;
    } else if(ext==='pdf'){
      passageHTML=`<iframe src="${publicUrl}" style="width:100%;height:100%;min-height:700px;border:none;background:#fff;border-radius:8px;"></iframe>`;
    } else {
      const resp = await fetch(publicUrl);
      passageHTML = await resp.text();
      rawText = passageHTML.replace(/<[^>]+>/g,'');
    }

    setProgress(60,'Rendering passage…');
    document.getElementById('passageContent').innerHTML = passageHTML || '<p>Could not render passage.</p>';

    setProgress(72,'Extracting questions with AI…');
    await extractQuestions(rawText);

    setProgress(100,'Ready!');
    setTimeout(()=>{ document.getElementById('loadOv').classList.add('gone'); startTimer(); started=true; }, 400);
  }catch(err){
    console.error(err);
    document.getElementById('passageContent').innerHTML=`<div style="padding:2rem;text-align:center;color:var(--text-muted);"><div style="font-size:2.5rem;margin-bottom:1rem;">⚠️</div><h3>Could not load file</h3><p style="margin-top:.5rem;font-size:.85rem;">${err.message}</p></div>`;
    buildFallback();
    setTimeout(()=>{ document.getElementById('loadOv').classList.add('gone'); startTimer(); started=true; },500);
  }
}

// AI EXTRACTION
async function extractQuestions(rawText){
  if(!rawText||rawText.trim().length<80){ buildFallback(); return; }
  try{
    const resp = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:4000,
        messages:[{role:'user',content:`You are an IELTS reading test parser.

Read this IELTS test document and extract ONLY the questions section (not the passage/article text).

Identify each question section and its type:
- "short-answer" = write words from passage
- "mcq" = choose A B C D  
- "tfng" = True/False/Not Given
- "ynng" = Yes/No/Not Given
- "matching" = match headings/statements
- "fill-blank" = complete sentences/notes

Return ONLY this JSON, nothing else:
{
  "sections": [
    {
      "heading": "Questions 1-7",
      "type": "short-answer",
      "instruction": "exact instruction from document",
      "questions": [
        {"id": 1, "text": "exact question text"}
      ]
    },
    {
      "heading": "Questions 8-11", 
      "type": "tfng",
      "instruction": "exact instruction",
      "questions": [
        {"id": 8, "text": "statement text"}
      ]
    },
    {
      "heading": "Questions 12-14",
      "type": "mcq",
      "instruction": "exact instruction",
      "questions": [
        {"id": 12, "text": "question", "options": ["A  first option", "B  second option", "C  third option", "D  fourth option"]}
      ]
    }
  ]
}

Document text:
---
${rawText.slice(0,9000)}
---`}]
      })
    });
    const data = await resp.json();
    const text = (data.content||[]).map(b=>b.text||'').join('');
    const match = text.match(/\{[\s\S]*\}/);
    if(!match) throw new Error('No JSON returned');
    const parsed = JSON.parse(match[0]);
    if(parsed.sections&&parsed.sections.length>0&&parsed.sections.some(s=>s.questions&&s.questions.length>0)){
      renderQuestions(parsed.sections);
    } else {
      smartParse(rawText);
    }
  }catch(e){
    console.warn('AI failed:',e.message);
    smartParse(rawText);
  }
}

// SMART TEXT PARSER FALLBACK
function smartParse(text){
  const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
  const sections=[], qPat=/^(\d{1,2})[.)]\s+(.+)/, secPat=/questions?\s+(\d+)[^\d]+(\d+)/i;
  let curSec=null, curType='short-answer';

  const detect=(chunk)=>{
    if(/true.{0,5}false.{0,5}not given/i.test(chunk)) return 'tfng';
    if(/yes.{0,5}no.{0,5}not given/i.test(chunk)) return 'ynng';
    if(/choose the correct letter/i.test(chunk)) return 'mcq';
    if(/no more than|write.{1,20}word/i.test(chunk)) return 'short-answer';
    if(/match|heading/i.test(chunk)) return 'matching';
    return null;
  };

  for(let i=0;i<lines.length;i++){
    const line=lines[i];
    if(secPat.test(line)){
      if(curSec&&curSec.questions.length) sections.push(curSec);
      const ctx = lines.slice(i,i+6).join(' ');
      curType = detect(ctx)||curType;
      curSec = {heading:line, type:curType, instruction:'', questions:[]};
      continue;
    }
    const detected = detect(line);
    if(detected){ curType=detected; if(curSec) curSec.type=curType; continue; }
    const qm = line.match(qPat);
    if(qm){
      const id=parseInt(qm[1]), qtext=qm[2];
      if(!curSec) curSec={heading:'Questions',type:curType,instruction:'',questions:[]};
      if(curType==='mcq'){
        const opts=[];
        let j=i+1;
        while(j<lines.length&&/^[A-D][.)]\s+/.test(lines[j])){ opts.push(lines[j].replace(/^([A-D])[.)]\s+/,'$1  ')); j++; }
        curSec.questions.push({id,text:qtext,options:opts.length?opts:['A  Option A','B  Option B','C  Option C','D  Option D']});
        i=j-1;
      } else {
        curSec.questions.push({id,text:qtext});
      }
    }
  }
  if(curSec&&curSec.questions.length) sections.push(curSec);
  const total = sections.reduce((a,s)=>a+s.questions.length,0);
  if(sections.length>0&&total>0){ renderQuestions(sections); } else { buildFallback(); }
}

// FALLBACK
function buildFallback(){
  renderQuestions([
    {heading:'Questions 1–7',type:'short-answer',instruction:'Write NO MORE THAN THREE WORDS AND/OR A NUMBER from the passage.',
     questions:[{id:1,text:'What is the main topic of the passage?'},{id:2,text:'According to the text, what is the key finding?'},{id:3,text:'What time period does the passage refer to?'},{id:4,text:'Who are the main people or groups described?'},{id:5,text:'What problem does the author identify?'},{id:6,text:'What solution is suggested?'},{id:7,text:'What conclusion does the author reach?'}]},
    {heading:'Questions 8–11',type:'tfng',instruction:'Write TRUE, FALSE or NOT GIVEN based on the passage.',
     questions:[{id:8,text:'The passage uses evidence from multiple studies.'},{id:9,text:'The author gives a personal recommendation.'},{id:10,text:'The results apply equally to all groups.'},{id:11,text:'Further research is called for.'}]},
    {heading:'Questions 12–14',type:'mcq',instruction:'Choose the correct letter, A, B, C or D.',
     questions:[
       {id:12,text:'What is the main purpose of this passage?',options:['A  To argue for a change in policy','B  To present and analyse research findings','C  To compare two opposing theories','D  To describe a historical development']},
       {id:13,text:'The overall tone of the passage is best described as:',options:['A  Emotional and persuasive','B  Objective and informative','C  Highly critical','D  Optimistic and encouraging']},
       {id:14,text:'What does the author conclude?',options:['A  The issue remains unresolved','B  Easy solutions exist','C  More research is needed','D  The evidence is inconclusive']}
     ]}
  ]);
}

// RENDER QUESTIONS
function renderQuestions(sections){
  const container=document.getElementById('questionsContent');
  totalQ=sections.reduce((a,s)=>a+(s.questions?s.questions.length:0),0);
  let html=`<div class="ai-badge">✨ Questions extracted from your document</div>`;
  sections.forEach(sec=>{
    if(!sec.questions||!sec.questions.length) return;
    html+=`<div class="q-block"><div class="q-block-head">${sec.heading||''}</div><div class="q-block-body">`;
    if(sec.instruction) html+=`<div class="q-instruction">${sec.instruction}</div>`;
    sec.questions.forEach(q=>{
      html+=`<div class="q-item" id="qi${q.id}"><div class="q-row"><div class="q-badge" id="qb${q.id}">${q.id}</div><div class="q-label">${q.text}</div></div>`;
      if(sec.type==='short-answer'||sec.type==='fill-blank'){
        html+=`<input class="q-inp" id="qa${q.id}" type="text" placeholder="Your answer…" oninput="rec(${q.id},this.value)"/>`;
      } else if(sec.type==='tfng'){
        html+=`<div class="tfng-row">${['TRUE','FALSE','NOT GIVEN'].map(o=>`<button class="tfng-opt" onclick="recBtn(${q.id},'${o}',this,'tfng-row')">${o}</button>`).join('')}</div>`;
      } else if(sec.type==='ynng'){
        html+=`<div class="tfng-row">${['YES','NO','NOT GIVEN'].map(o=>`<button class="tfng-opt" onclick="recBtn(${q.id},'${o}',this,'tfng-row')">${o}</button>`).join('')}</div>`;
      } else if(sec.type==='mcq'){
        const opts=q.options||['A  Option A','B  Option B','C  Option C','D  Option D'];
        html+=`<div class="mcq-list">${opts.map((o,oi)=>`<div class="mcq-opt" onclick="recMCQ(${q.id},'${String.fromCharCode(65+oi)}',this)"><div class="mcq-circle"></div><span>${o}</span></div>`).join('')}</div>`;
      } else if(sec.type==='matching'){
        const opts=(sec.matchOptions||['A','B','C','D','E','F','G','H']).map(o=>`<option value="${o}">${o}</option>`).join('');
        html+=`<select class="q-select" onchange="rec(${q.id},this.value)"><option value="">— Select —</option>${opts}</select>`;
      } else {
        html+=`<input class="q-inp" id="qa${q.id}" type="text" placeholder="Your answer…" oninput="rec(${q.id},this.value)"/>`;
      }
      html+=`</div>`;
    });
    html+=`</div></div>`;
  });
  container.innerHTML=html;
  document.getElementById('totCount').textContent=totalQ;
  let strip=`<span class="ans-strip-lbl">Questions:</span>`;
  for(let i=1;i<=totalQ;i++) strip+=`<div class="a-dot" id="ad${i}" onclick="scrollToQ(${i})" title="Q${i}">${i}</div>`;
  document.getElementById('ansStrip').innerHTML=strip;
}

// ANSWERS
function rec(id,val){
  if(val&&val.trim()){ answers[id]=val.trim(); markDone(id,true); } else { delete answers[id]; markDone(id,false); }
  document.getElementById('ansCount').textContent=Object.keys(answers).length;
}
function recBtn(id,val,btn,rowClass){
  btn.closest('.'+rowClass).querySelectorAll('.tfng-opt').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel'); answers[id]=val; markDone(id,true);
  document.getElementById('ansCount').textContent=Object.keys(answers).length;
}
function recMCQ(id,val,el){
  el.closest('.mcq-list').querySelectorAll('.mcq-opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel'); answers[id]=val; markDone(id,true);
  document.getElementById('ansCount').textContent=Object.keys(answers).length;
}
function markDone(id,yes){
  document.getElementById('qb'+id)?.classList.toggle('done',yes);
  document.getElementById('qa'+id)?.classList.toggle('done',yes);
  document.getElementById('ad'+id)?.classList.toggle('done',yes);
}
function scrollToQ(id){ document.getElementById('qi'+id)?.scrollIntoView({behavior:'smooth',block:'center'}); }

// TIMER
function startTimer(){
  timerInt=setInterval(()=>{
    timeLeft--;
    const m=Math.floor(timeLeft/60).toString().padStart(2,'0');
    const s=(timeLeft%60).toString().padStart(2,'0');
    const el=document.getElementById('timerEl');
    el.textContent=`${m}:${s}`;
    el.className='timer-display'+(timeLeft<=300?' danger':timeLeft<=600?' warning':'');
    if(timeLeft<=0){ clearInterval(timerInt); showResults(true); }
  },1000);
}

// HIGHLIGHT
function setHL(c){ hlColor=c; ['y','g','p'].forEach(x=>document.getElementById('hl'+x)?.classList.toggle('on',x===c)); }
document.addEventListener('mouseup',()=>{
  if(!hlColor) return;
  const sel=window.getSelection();
  if(!sel||sel.isCollapsed) return;
  const range=sel.getRangeAt(0);
  if(!document.getElementById('passageContent').contains(range.commonAncestorContainer)) return;
  const span=document.createElement('span'); span.className='hl'+hlColor;
  try{ range.surroundContents(span); }catch(e){}
  sel.removeAllRanges();
});
function clearHL(){ document.querySelectorAll('.hly,.hlg,.hlp').forEach(el=>el.replaceWith(...el.childNodes)); }
function togglePane(){ const p=document.getElementById('passagePane'); p.style.display=p.style.display==='none'?'':'none'; }

// SUBMIT
function openSubmit(){
  const un=totalQ-Object.keys(answers).length;
  document.getElementById('modalInner').innerHTML=`
    <div style="font-size:2.2rem;margin-bottom:.75rem;">${un>0?'⚠️':'✅'}</div>
    <h2 style="font-family:'Cormorant Garamond',serif;font-size:1.55rem;margin-bottom:.65rem;">${un>0?'Submit with unanswered questions?':'Ready to submit?'}</h2>
    <p style="color:var(--text-muted);font-size:.87rem;margin-bottom:1.75rem;">${un>0?`<strong style="color:#f0c060;">${un} question${un>1?'s':''} unanswered.</strong> Are you sure?`:'All questions answered. Good work!'}</p>
    <div style="display:flex;gap:.65rem;justify-content:center;">
      <button onclick="closeModal()" class="btn btn-outline" style="padding:.6rem 1.3rem;">Go Back</button>
      <button onclick="submitNow()" class="btn btn-blue">Submit Now →</button>
    </div>`;
  document.getElementById('modalOv').classList.add('open');
}
function closeModal(){ if(!done) document.getElementById('modalOv').classList.remove('open'); }
function submitNow(){ clearInterval(timerInt); done=true; showResults(false); }
function showResults(timedOut){
  const answered=Object.keys(answers).length;
  const timeTaken=3600-timeLeft;
  const pct=totalQ>0?answered/totalQ:0;
  const band=Math.min(9,Math.max(1,1+pct*8)).toFixed(1);
  const col=band>=7?'#5de89a':band>=5?'var(--blue-sky)':'#f08888';
  document.getElementById('modalInner').innerHTML=`
    <div style="font-size:1.8rem;margin-bottom:.5rem;">${timedOut?'⏱ Time\'s Up!':'🎉 Submitted!'}</div>
    <div class="res-score" style="color:${col};">${band}</div>
    <div class="res-label">Estimated Band Score</div>
    <div class="res-grid">
      <div class="res-cell"><div class="res-cell-n">${answered}</div><div class="res-cell-l">Answered</div></div>
      <div class="res-cell"><div class="res-cell-n">${totalQ-answered}</div><div class="res-cell-l">Skipped</div></div>
      <div class="res-cell"><div class="res-cell-n">${Math.floor(timeTaken/60)}m ${timeTaken%60}s</div><div class="res-cell-l">Time Used</div></div>
      <div class="res-cell"><div class="res-cell-n">${Math.round(pct*100)}%</div><div class="res-cell-l">Completion</div></div>
    </div>
    <p style="font-size:.78rem;color:var(--text-subtle);margin-bottom:1.5rem;">Estimated score based on completion. Your teacher will confirm the official band.</p>
    <div style="display:flex;gap:.65rem;justify-content:center;flex-wrap:wrap;">
      <a href="dashboard.html" class="btn btn-blue">My Dashboard</a>
      <a href="reading.html" class="btn btn-outline">More Tests</a>
    </div>`;
  document.getElementById('modalOv').classList.add('open');
}
function doExit(){ if(confirm('Exit exam? Your answers will be lost.')){ clearInterval(timerInt); history.back(); } }
document.getElementById('modalOv').addEventListener('click',e=>{ if(e.target===document.getElementById('modalOv')&&!done) closeModal(); });
window.addEventListener('beforeunload',e=>{ if(started&&!done){e.preventDefault();e.returnValue='';} });

// DRAG DIVIDER
const div=document.getElementById('divider');
let drag=false;
div.addEventListener('mousedown',e=>{drag=true;e.preventDefault();});
document.addEventListener('mousemove',e=>{
  if(!drag) return;
  const body=document.querySelector('.exam-body');
  const rect=body.getBoundingClientRect();
  const pct=Math.min(75,Math.max(25,((e.clientX-rect.left)/rect.width)*100));
  document.getElementById('passagePane').style.width=pct+'%';
});
document.addEventListener('mouseup',()=>{drag=false;});
</script>
</body>
